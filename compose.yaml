networks:
  dtm-network:
    name: dtm-network

volumes:
  db-data:
    name: drone-tm-db-data
  frontend-html:
    name: drone-tm-frontend-html
  minio-data:
    name: drone-tm-minio-data

services:
  backend:
    image: ghcr.io/hotosm/drone-tm/backend:debug
    build:
      context: src/backend
      dockerfile: Dockerfile
      args:
        - MONITORING=${MONITORING}
    depends_on:
      db:
        condition: service_healthy
      nodeodm:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    ports:
      - ${BACKEND_WEB_APP_PORT:-8000}:8000
      # For minio
      - 9000:9000
      - 9090:9090
    volumes:
      - ./src/backend/pyproject.toml:/project/src/backend/pyproject.toml:ro
      - ./src/backend/app:/project/src/backend/app:ro
      - ./src/backend/tests:/project/src/backend/tests:ro
      - ./src/backend/packages/drone-flightplan/drone_flightplan:/opt/python/lib/python3.11/site-packages/drone_flightplan:ro
      - frontend-html:/project/src/backend/frontend_html
    env_file: .env
    environment:
      # In dev the browser can't resolve docker DNS names like `minio`,
      # so presigned URLs must use a host-accessible base.
      S3_ENDPOINT_UPLOAD: ${S3_ENDPOINT_UPLOAD:-http://localhost:9000}
      # In dev, use the host-exposed MinIO port for presigned URLs.
      # (Path-rewriting proxies like `/s3` break S3 presigned signatures.)
      S3_ENDPOINT_DOWNLOAD: ${S3_ENDPOINT_DOWNLOAD:-http://localhost:9000}
    networks:
      - dtm-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/__lbheartbeat__"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: ghcr.io/hotosm/drone-tm/frontend:debug
    build:
      context: src/frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - ${FRONTEND_WEB_APP_PORT:-3040}:3040
    depends_on:
      backend:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_WEB_APP_PORT:-8000}/api}
    networks:
      - dtm-network
    volumes:
      - ./src/frontend/public:/app/public
      - ./src/frontend/src:/app/src
      - ./src/frontend/components.json:/app/components.json
      - ./src/frontend/index.html:/app/index.html
      - ./src/frontend/postcss.config.js:/app/postcss.config.js
      - ./src/frontend/tailwind.config.js:/app/tailwind.config.js
      - ./src/frontend/vite.config.ts:/app/vite.config.ts
      - frontend-html:/frontend_html

  # If error, please upgrade the db with `contrib/pg-upgrade/compose.yaml`
  db:
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file: .env
    environment:
      LANG: en-GB.utf8
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=en-GB"
    ports:
      - "5467:5432"
    networks:
      - dtm-network
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-dtm} -d ${POSTGRES_DB:-dtm_db}
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: "docker.io/minio/minio:${MINIO_TAG:-RELEASE.2024-08-03T04-33-23Z}"
    command: server /export --console-address 0.0.0.0:9090 --address 0.0.0.0:9000
    volumes:
      - minio-data:/export
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-somelongpassword}
    env_file:
      - .env
    network_mode: service:backend
    restart: unless-stopped
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 5s
      retries: 3
      start_period: 5s
      timeout: 5s

  createbuckets:
    image: "docker.io/minio/minio:${MINIO_TAG:-RELEASE.2024-08-03T04-33-23Z}"
    entrypoint: >
      /bin/sh -c " mc config host add minio http://localhost:9000 \$S3_ACCESS_KEY \$S3_SECRET_KEY; mc mb minio/\$S3_BUCKET_NAME; mc anonymous set download minio/\$S3_BUCKET_NAME/publicuploads/; mc anonymous set download minio/\$S3_BUCKET_NAME/tutorials/; exit 0; "
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    network_mode: service:backend
    restart: "no"

  migrations:
    image: ghcr.io/hotosm/drone-tm/backend:debug
    volumes:
      - ./src/backend:/project/src/backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - dtm-network
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  arq-worker:
    image: ghcr.io/hotosm/drone-tm/backend:debug
    command: arq --watch /project/src/backend/app app.arq.tasks.WorkerSettings
    depends_on:
      backend:
        condition: service_healthy
      dragonfly:
        condition: service_started
      nodeodm:
        condition: service_started
    volumes:
      - ./src/backend:/project/src/backend
    env_file: .env
    network_mode: service:backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "arq", "app.arq.tasks.WorkerSettings", "--check"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 20s

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.36.0
    network_mode: service:backend
    restart: unless-stopped

  # This container does the actual imagery processing (not persistent, scalable)
  nodeodm:
    image: docker.io/opendronemap/nodeodm:3.5.5
    command: ["--port", "9900"]
    env_file: .env
    ports:
      - 9900:9900
    networks:
      - dtm-network
    restart: unless-stopped
    oom_score_adj: 500
