<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="description" content="Drone Tasking Manager - Together, We Map. Open. Accurate. Accessible. An open source solution to harness the power of the crowd to generate high-resolution aerial maps." />
    <title>Drone Tasking Manager</title>

    <!-- Preload hero background image for fast LCP -->
    <link rel="preload" as="image" href="/images/DroneTM-bg.jpg" fetchpriority="high" />

    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- WebAwesome CSS - shared across all HOT tools via browser cache -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/native.css" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/utilities.css" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist/styles/themes/default.css" />

    <!-- Fonts with display=swap to prevent render blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Symbols+Outlined&display=swap"
      rel="stylesheet"
    />
    <!-- Runtime config MUST load before any JS modules -->
    <script src="/config.js"></script>
  </head>

  <body>
    <div id="backdrop-root"></div>
    <div id="overlay-root"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
