# compose.dev.yaml - Development server
# Deploy to: dev.drone.hotosm.org
# Standalone server with Traefik (auto SSL)

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${CERT_EMAIL:-sysadmin@hotosm.org}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - internal

  frontend:
    image: ghcr.io/hotosm/drone-tm/frontend:dev
    restart: unless-stopped
    volumes:
      - frontend-html:/frontend_html
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
    volumes:
      - frontend-html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`dev.drone.hotosm.org`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backend:
    image: ghcr.io/hotosm/drone-tm/backend:dev
    restart: unless-stopped
    deploy:
      replicas: 2
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Auth - prepared for Hanko (uses legacy until PR merges)
      - AUTH_PROVIDER=${AUTH_PROVIDER:-legacy}
      - HANKO_API_URL=${HANKO_API_URL:-https://dev.login.hotosm.org}
      - JWT_ISSUER=${JWT_ISSUER}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.hotosm.org}
      # Legacy Google OAuth (fallback)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_LOGIN_REDIRECT_URI=https://dev.drone.hotosm.org/auth
      # General
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - LOG_LEVEL=INFO
      - DOMAIN=dev.drone.hotosm.org
      - FRONTEND_URL=https://dev.drone.hotosm.org
      - BACKEND_URL=https://dev.drone.hotosm.org/api
      # S3/MinIO
      - S3_ENDPOINT=http://minio:9000
      - S3_ENDPOINT_UPLOAD=https://s3.dev.drone.hotosm.org
      - S3_ENDPOINT_DOWNLOAD=https://s3.dev.drone.hotosm.org
      - S3_DOWNLOAD_ROOT=https://s3.dev.drone.hotosm.org
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=dronetm
      # Redis/Dragonfly
      - DRAGONFLY_DSN=redis://dragonfly:6379/0
      # ODM
      - ODM_ENDPOINT=http://nodeodm:9900
      # CORS
      - EXTRA_CORS_ORIGINS=["https://dev.drone.hotosm.org","https://dev.login.hotosm.org","https://dev.portal.hotosm.org"]
      # Admin
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`dev.drone.hotosm.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/__lbheartbeat__"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.36.0
    restart: unless-stopped
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # MinIO S3 API
      - "traefik.http.routers.minio-api.rule=Host(`s3.dev.drone.hotosm.org`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # MinIO Console
      - "traefik.http.routers.minio-console.rule=Host(`minio.dev.drone.hotosm.org`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  createbuckets:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set minio http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing minio/dronetm;
      mc anonymous set download minio/dronetm/publicuploads/;
      mc anonymous set download minio/dronetm/tutorials/;
      exit 0;
      "
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      - minio
    networks:
      - internal
    restart: "no"

  migrations:
    image: ghcr.io/hotosm/drone-tm/backend:dev
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - internal
    restart: "no"

  arq-worker:
    image: ghcr.io/hotosm/drone-tm/backend:dev
    command: arq app.arq.tasks.WorkerSettings
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DRAGONFLY_DSN=redis://dragonfly:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ENDPOINT_UPLOAD=https://s3.dev.drone.hotosm.org
      - S3_ENDPOINT_DOWNLOAD=https://s3.dev.drone.hotosm.org
      - S3_DOWNLOAD_ROOT=https://s3.dev.drone.hotosm.org
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=dronetm
      - ODM_ENDPOINT=http://nodeodm:9900
    networks:
      - internal

  nodeodm:
    image: opendronemap/nodeodm:latest
    restart: unless-stopped
    command: ["--port", "9900"]
    networks:
      - internal

networks:
  internal:

volumes:
  db-data:
  minio-data:
  frontend-html:
  traefik-certs:
