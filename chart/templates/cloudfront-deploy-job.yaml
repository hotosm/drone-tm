{{- if eq (.Values.frontend.mode | default "bundleWithBackend") "cloudfront" }}
{{- $cf := .Values.frontend.cloudfront }}
{{- $version := $cf.version | default .Chart.AppVersion }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "drone-tm.fullname" . }}-cloudfront-deploy
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudfront-deploy
  annotations:
    # Argo CD: run after deployments so the new backend is live
    # before the new frontend starts serving traffic.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "15"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "drone-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: cloudfront-deploy
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "drone-tm.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: frontend-assets
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          env:
            {{- range $k, $v := (.Values.frontend.runtimeEnv | default dict) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: frontend-html
              mountPath: /frontend_html
      containers:
        - name: deploy
          image: "{{ $cf.awsCliImage.repository }}:{{ $cf.awsCliImage.tag }}"
          imagePullPolicy: {{ $cf.awsCliImage.pullPolicy }}
          env:
            - name: AWS_DEFAULT_REGION
              value: {{ $cf.region | quote }}
          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              set -x

              BUCKET={{ $cf.s3Bucket | quote }}
              VERSION={{ $version | quote }}
              RELEASE={{ include "drone-tm.fullname" . | quote }}

              # ── 1. Sync frontend to versioned S3 path ──────────────────────
              echo "Syncing to s3://${BUCKET}/${VERSION}/"
              aws s3 sync /frontend_html/ "s3://${BUCKET}/${VERSION}/" \
                --delete \
                --cache-control "public, max-age=31536000, immutable"

              # index.html and config.js must not be cached long (mutable on each deploy).
              for f in index.html config.js; do
                if aws s3 ls "s3://${BUCKET}/${VERSION}/${f}" 2>/dev/null; then
                  aws s3 cp "s3://${BUCKET}/${VERSION}/${f}" "s3://${BUCKET}/${VERSION}/${f}" \
                    --cache-control "public, max-age=60" \
                    --metadata-directive REPLACE
                fi
              done

              # ── 2. Find or create CloudFront distribution ───────────────────
              echo "Looking up CloudFront distribution for ${BUCKET}..."
              DIST_ID=$(aws cloudfront list-distributions \
                --query "DistributionList.Items[?Origins.Items[0].DomainName=='${BUCKET}.s3.amazonaws.com'].Id | [0]" \
                --output text 2>/dev/null || true)
              [ "${DIST_ID}" = "None" ] && DIST_ID=""

              if [ -n "${DIST_ID}" ]; then
                echo "Found existing distribution ${DIST_ID}"
              else
                echo "No distribution found - creating one..."

                # Origin Access Control (find or create by name).
                OAC_NAME="${RELEASE}-oac"
                OAC_ID=$(aws cloudfront list-origin-access-controls \
                  --query "OriginAccessControlList.Items[?Name=='${OAC_NAME}'].Id | [0]" \
                  --output text 2>/dev/null || true)
                [ "${OAC_ID}" = "None" ] && OAC_ID=""

                if [ -z "${OAC_ID}" ]; then
                  OAC_ID=$(aws cloudfront create-origin-access-control \
                    --origin-access-control-config \
                      "Name=${OAC_NAME},SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=s3,Description=Managed by drone-tm helm chart" \
                    --query "OriginAccessControl.Id" --output text)
                  echo "Created OAC ${OAC_ID}"
                fi

                # Build distribution config via Python (cleaner than inline JSON escaping).
                DIST_CONFIG=$(python3 -c "
              import json, time
              config = {
                  'CallerReference': f'drone-tm-{int(time.time())}',
                  'Comment': '${RELEASE} frontend',
                  'Enabled': True,
                  'DefaultRootObject': 'index.html',
                  'Origins': {
                      'Quantity': 1,
                      'Items': [{
                          'Id': 's3-${BUCKET}',
                          'DomainName': '${BUCKET}.s3.amazonaws.com',
                          'OriginPath': '/${VERSION}',
                          'S3OriginConfig': {'OriginAccessIdentity': ''},
                          'OriginAccessControlId': '${OAC_ID}',
                      }],
                  },
                  'DefaultCacheBehavior': {
                      'TargetOriginId': 's3-${BUCKET}',
                      'ViewerProtocolPolicy': 'redirect-to-https',
                      'CachePolicyId': '658327ea-f89d-4fab-a63d-7e88639e58f6',
                      'Compress': True,
                  },
                  'CustomErrorResponses': {
                      'Quantity': 2,
                      'Items': [
                          {'ErrorCode': 403, 'ResponseCode': '200', 'ResponsePagePath': '/index.html', 'ErrorCachingMinTTL': 60},
                          {'ErrorCode': 404, 'ResponseCode': '200', 'ResponsePagePath': '/index.html', 'ErrorCachingMinTTL': 60},
                      ],
                  },
                  'PriceClass': '{{ $cf.priceClass }}',
              }
              {{- $aliases := $cf.aliases | default list }}
              {{- if $aliases }}
              config['Aliases'] = {'Quantity': {{ len $aliases }}, 'Items': [{{ range $i, $a := $aliases }}{{ if $i }}, {{ end }}'{{ $a }}'{{ end }}]}
              config['ViewerCertificate'] = {
                  'ACMCertificateArn': '{{ $cf.acmCertificateArn }}',
                  'SSLSupportMethod': 'sni-only',
                  'MinimumProtocolVersion': 'TLSv1.2_2021',
              }
              {{- else }}
              config['Aliases'] = {'Quantity': 0, 'Items': []}
              config['ViewerCertificate'] = {'CloudFrontDefaultCertificate': True}
              {{- end }}
              print(json.dumps(config))
              ")

                DIST_ARN=$(aws cloudfront create-distribution \
                  --distribution-config "${DIST_CONFIG}" \
                  --query "Distribution.ARN" --output text)
                DIST_ID=$(echo "${DIST_ARN}" | awk -F/ '{print $NF}')
                echo "Created distribution ${DIST_ID}"

                # Grant CloudFront OAC read access to the S3 bucket.
                BUCKET_POLICY=$(python3 -c "
              import json
              print(json.dumps({
                  'Version': '2012-10-17',
                  'Statement': [{
                      'Sid': 'AllowCloudFrontOAC',
                      'Effect': 'Allow',
                      'Principal': {'Service': 'cloudfront.amazonaws.com'},
                      'Action': 's3:GetObject',
                      'Resource': 'arn:aws:s3:::${BUCKET}/*',
                      'Condition': {
                          'StringEquals': {
                              'AWS:SourceArn': '${DIST_ARN}'
                          }
                      }
                  }]
              }))
              ")
                aws s3api put-bucket-policy --bucket "${BUCKET}" --policy "${BUCKET_POLICY}"
                echo "S3 bucket policy updated for OAC access"
              fi

              # ── 3. Update origin path to the new version ────────────────────
              echo "Updating origin path to /${VERSION}..."
              ETAG=$(aws cloudfront get-distribution-config --id "${DIST_ID}" --query "ETag" --output text)
              UPDATED_CONFIG=$(aws cloudfront get-distribution-config --id "${DIST_ID}" --query "DistributionConfig" \
                | python3 -c "
              import json, sys
              config = json.load(sys.stdin)
              config['Origins']['Items'][0]['OriginPath'] = '/${VERSION}'
              print(json.dumps(config))
              ")
              aws cloudfront update-distribution --id "${DIST_ID}" --if-match "${ETAG}" --distribution-config "${UPDATED_CONFIG}"

              # ── 4. Invalidate CloudFront cache ──────────────────────────────
              echo "Invalidating cache..."
              aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"

              echo "Done - version=${VERSION} distribution=${DIST_ID}"
          volumeMounts:
            - name: frontend-html
              mountPath: /frontend_html
              readOnly: true
      volumes:
        - name: frontend-html
          emptyDir: {}
{{- end }}
