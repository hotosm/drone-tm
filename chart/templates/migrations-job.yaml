{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "drone-tm.fullname" . }}-migrations
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "drone-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          args: ["alembic", "upgrade", "head"]
          {{- $extraEnvFrom := (.Values.extraEnvFrom | default list) -}}
          {{- include "drone-tm.renderEnvFrom" (dict "root" . "extraEnvFrom" $extraEnvFrom) | nindent 10 }}
          {{- $env := (.Values.env | default dict) -}}
          {{- if $env }}
          env:
            {{- include "drone-tm.renderEnvOmit" (dict "env" $env "omit" (dict "REDIS_DSN" true)) | nindent 12 }}
          {{- end }}
{{- end }}
