{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "drone-tm.fullname" . }}-migrations
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    # Argo CD: run migrations after core inputs (e.g., SealedSecret) are applied,
    # but before Deployments start.
    #
    # Why Sync (not PreSync)?
    # - SealedSecret -> Secret creation is asynchronous; PreSync runs before the SealedSecret
    #   is applied, so the Secret may not exist yet.
    # - Sync + waves yields a stable ordering: core resources (wave 0) -> migrations (wave 5) -> Deployments (wave 10).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "drone-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      # Run as a PreSync hook: avoid depending on in-chart resources that would be created
      # in the main Sync phase (e.g., ServiceAccount). The default ServiceAccount always exists.
      restartPolicy: Never
      containers:
        - name: migrations
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          args: ["alembic", "upgrade", "head"]
          {{- $extraEnvFrom := (.Values.extraEnvFrom | default list) -}}
          {{- include "drone-tm.renderEnvFrom" (dict "root" . "extraEnvFrom" $extraEnvFrom) | nindent 10 }}
          {{- $env := (.Values.env | default dict) -}}
          {{- if $env }}
          env:
            {{- include "drone-tm.renderEnvOmit" (dict "env" $env "omit" (dict "DRAGONFLY_DSN" true)) | nindent 12 }}
          {{- end }}
{{- end }}
