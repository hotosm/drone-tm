{{- if .Values.qgis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone-tm.qgis.fullname" . }}
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: qgis
spec:
  type: {{ .Values.qgis.service.type }}
  ports:
    - port: {{ .Values.qgis.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "drone-tm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qgis
{{- end }}
