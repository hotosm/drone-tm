apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone-tm.backend.fullname" . }}
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    # Argo CD: Deployments should start after migrations (see migrations-job.yaml)
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "drone-tm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "drone-tm.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "drone-tm.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.frontendAssets.enabled }}
      initContainers:
        - name: frontend-assets
          image: "{{ .Values.frontendAssets.image.repository }}:{{ .Values.frontendAssets.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontendAssets.image.pullPolicy }}
          env:
            {{- range $k, $v := (.Values.frontendAssets.runtimeEnv | default dict) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: frontend-html
              mountPath: /frontend_html
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-backend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          {{- $extraEnvFrom := (.Values.extraEnvFrom | default list) -}}
          {{- include "drone-tm.renderEnvFrom" (dict "root" . "extraEnvFrom" $extraEnvFrom) | nindent 10 }}
          env:
            - name: DRAGONFLY_DSN
              value: "redis://{{ include "drone-tm.dragonfly.serviceFQDN" . }}:6379/0"
            {{- include "drone-tm.renderEnvOmit" (dict "env" (.Values.env | default dict) "omit" (dict "DRAGONFLY_DSN" true)) | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          volumeMounts:
            {{- if .Values.frontendAssets.enabled }}
            - name: frontend-html
              mountPath: /project/src/backend/frontend_html
            {{- end }}
            - name: temp-storage
              mountPath: /tmp
      volumes:
        {{- if .Values.frontendAssets.enabled }}
        - name: frontend-html
          emptyDir: {}
        {{- end }}
        - name: temp-storage
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
