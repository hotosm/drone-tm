{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "drone-tm.serviceAccountName" . }}
  labels:
    {{- include "drone-tm.labels" . | nindent 4 }}
  annotations:
    # Argo CD: create ServiceAccount early in the sync, before Deployments.
    argocd.argoproj.io/sync-wave: "-10"
    {{- if and (eq (.Values.frontend.mode | default "bundleWithBackend") "cloudfront") .Values.frontend.cloudfront.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.frontend.cloudfront.roleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
