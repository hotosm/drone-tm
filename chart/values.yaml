# Default values for drone-tm
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # Used by some dependencies (e.g. Bitnami charts) to set PVC storage class.
  storageClass: ""

# The chart does NOT create secrets.
# Provide a pre-created Secret (e.g. from SealedSecrets) containing the app env vars.
existingSecret:
  # If empty, defaults to "<release>-drone-tm-secrets"
  # This Secret should include your backend env (DB/S3/Redis/Google/etc).
  # For public URLs the backend now derives links from `DOMAIN` (+ `DEBUG`).
  name: ""

# Single ingress for both UI (`/`) and API (`/api`) routes, pointing at the backend service.
ingress:
  enabled: true
  className: ""
  labels: {}
  annotations: {}
  tls: []
  hosts:
    - host: drone-tm.localhost
      paths:
        - path: /
          pathType: Prefix
        - path: /api
          pathType: Prefix

# Main application services
backend:
  enabled: true
  image:
    repository: ghcr.io/hotosm/drone-tm/backend
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  resources: {}
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

  livenessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /__lbheartbeat__
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  # Optional extra envFrom (e.g. additional Secret/ConfigMap refs)
  extraEnvFrom: []

migrations:
  enabled: true
  backoffLimit: 3

frontendAssets:
  # Uses the frontend image as an initContainer to populate backend templates (the frontend image exits after syncing).
  enabled: true
  image:
    repository: ghcr.io/hotosm/drone-tm/frontend
    tag: ""
    pullPolicy: IfNotPresent

worker:
  enabled: true
  image:
    repository: ghcr.io/hotosm/drone-tm/backend
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources: {}

  extraEnvFrom: []

  livenessProbe:
    exec:
      command:
        - arq
        - app.arq.tasks.WorkerSettings
        - --check
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command:
        - arq
        - app.arq.tasks.WorkerSettings
        - --check
    initialDelaySeconds: 5
    periodSeconds: 5

podDisruptionBudget:
  backend:
    enabled: false
    minAvailable: 1
  worker:
    enabled: false
    minAvailable: 1

# Subchart configurations
# https://github.com/bitnami/charts/blob/main/bitnami/redis/values.yaml
redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: 7.2-debian-13
  auth:
    # In-cluster Redis not exposed publicly, so no auth required
    enabled: false
  architecture: standalone
  master:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

# https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
postgresql:
  enabled: false
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 16-debian-13
  auth:
    enablePostgresUser: false
    username: dtm
    database: dtm_db
    existingSecret: ""
    secretKeys:
      userPasswordKey: POSTGRES_PASSWORD
  initdb:
    scripts:
      01-enable-postgis.sql: |
        CREATE EXTENSION IF NOT EXISTS postgis;
  primary:
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 500Mi

# Kubernetes resources
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  runAsNonRoot: true
  runAsUser: 1001

nodeSelector: {}
tolerations: []
affinity: {}
