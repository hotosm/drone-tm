name: Deploy to dev.drone.hotosm.org

on:
  push:
    branches:
      - dev
    paths:
      - src/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_PREFIX }}/backend:dev \
            --target service \
            ./src/backend
          docker push ghcr.io/${{ env.IMAGE_PREFIX }}/backend:dev

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_PREFIX }}/frontend:dev \
            --target prod \
            --build-arg VITE_AUTH_PROVIDER=${{ vars.AUTH_PROVIDER || 'legacy' }} \
            --build-arg VITE_HANKO_URL=${{ vars.HANKO_API_URL || 'https://dev.login.hotosm.org' }} \
            --build-arg VITE_FRONTEND_URL=https://dev.drone.hotosm.org \
            --build-arg VITE_API_URL=https://dev.drone.hotosm.org/api \
            --build-arg API_URL=https://dev.drone.hotosm.org/api \
            --build-arg BASE_URL=https://dev.drone.hotosm.org/api \
            --build-arg SITE_NAME="Drone TM Dev" \
            ./src/frontend
          docker push ghcr.io/${{ env.IMAGE_PREFIX }}/frontend:dev

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          AUTH_PROVIDER: ${{ vars.AUTH_PROVIDER || 'legacy' }}
        run: |
          ssh $SSH_USER@$SSH_HOST << ENDSSH
            set -e

            APP_DIR="/opt/dronetm"

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker \$USER
              echo "Docker installed. Please re-run the workflow."
              exit 1
            fi

            # Clone or update repo
            if [ ! -d "\$APP_DIR" ]; then
              sudo mkdir -p \$APP_DIR
              sudo chown \$USER:\$USER \$APP_DIR
              git clone -b dev https://github.com/hotosm/drone-tm.git \$APP_DIR
              echo "✓ Cloned repository"
            fi

            cd \$APP_DIR

            # Pull latest changes
            git fetch origin dev
            git reset --hard origin/dev
            echo "✓ Updated to latest dev"

            # Create .env
            cat > .env << EOF
          POSTGRES_USER=dtm
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=dtm_db
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          AUTH_PROVIDER=${AUTH_PROVIDER}
          HANKO_API_URL=${{ vars.HANKO_API_URL || 'https://dev.login.hotosm.org' }}
          JWT_ISSUER=${{ vars.HANKO_API_URL || 'https://dev.login.hotosm.org' }}
          COOKIE_DOMAIN=.hotosm.org
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          CERT_EMAIL=sysadmin@hotosm.org
          ADMIN_EMAILS=${{ vars.ADMIN_EMAILS || '' }}
          EOF
            echo "✓ Created .env"

            # Login to GHCR
            echo "${GH_TOKEN}" | docker login ghcr.io -u ${GH_ACTOR} --password-stdin

            # Pull and deploy
            docker compose -f compose.dev.yaml pull
            docker compose -f compose.dev.yaml up -d --force-recreate

            # Cleanup old images
            docker image prune -af

            echo "✓ Deployment complete: https://dev.drone.hotosm.org"
          ENDSSH
