# compose.test.yaml
name: dtm-test

volumes:
  db-data:
  minio-data:
  frontend-html:

networks:
  dtm-network:
    driver: bridge

services:
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: src/backend
      args:
        INSTALL_TEST: "true"
    environment:
      MONITORING: ""
      LOG_LEVEL: "INFO"
      ODM_ENDPOINT: http://nodeodm:3000
      S3_ENDPOINT_UPLOAD: http://localhost:9000
      S3_ENDPOINT_DOWNLOAD: http://localhost:9000

  frontend:
    extends:
      file: compose.yaml
      service: frontend
    ports:
      - "3040:3040"

  db:
    extends:
      file: compose.yaml
      service: db

  minio:
    extends:
      file: compose.yaml
      service: minio

  createbuckets:
    extends:
      file: compose.yaml
      service: createbuckets

  migrations:
    image: ghcr.io/hotosm/drone-tm/backend:debug
    volumes:
      - ./src/backend:/project/src/backend
    env_file:
      - .env
    environment:
      MONITORING: ""
    networks:
      - dtm-network
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  arq-worker:
    extends:
      file: compose.yaml
      service: arq-worker
    environment:
      ODM_ENDPOINT: http://nodeodm:3000
      S3_ENDPOINT_UPLOAD: http://localhost:9000
      S3_ENDPOINT_DOWNLOAD: http://localhost:9000

  redis:
    extends:
      file: compose.yaml
      service: redis

  nodeodm:
    extends:
      file: compose.yaml
      service: nodeodm
    ports:
      # Using 9901 to avoid collision with the inherited file's 9900
      - "9901:3000"
