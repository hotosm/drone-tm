name: dtm-test

networks:
  dtm-network:
    name: dtm-network

volumes:
  db-data:
  rustfs-data:
  frontend-html:

services:
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: src
      dockerfile: backend/Dockerfile
      args:
        INSTALL_TEST: "true"
    environment:
      MONITORING: ""
      LOG_LEVEL: "INFO"
      AUTH_PROVIDER: "legacy"
      ODM_ENDPOINT: http://nodeodm:9900
      S3_ENDPOINT_UPLOAD: http://localhost:9000
      S3_ENDPOINT_DOWNLOAD: http://localhost:9000
      DRAGONFLY_DSN: redis://localhost:6379/0

  frontend:
    extends:
      file: compose.yaml
      service: frontend
    ports:
      - "3040:3040"

  db:
    extends:
      file: compose.yaml
      service: db

  s3:
    extends:
      file: compose.yaml
      service: s3

  s3-init:
    extends:
      file: compose.yaml
      service: s3-init

  migrations:
    extends:
      file: compose.yaml
      service: migrations
    environment:
      MONITORING: ""

  arq-worker:
    extends:
      file: compose.yaml
      service: arq-worker
    environment:
      ODM_ENDPOINT: http://nodeodm:9900
      S3_ENDPOINT_UPLOAD: http://localhost:9000
      S3_ENDPOINT_DOWNLOAD: http://localhost:9000
      DRAGONFLY_DSN: redis://localhost:6379/0

  dragonfly:
    extends:
      file: compose.yaml
      service: dragonfly

  qgis-packager:
    extends:
      file: compose.yaml
      service: qgis-packager

  nodeodm:
    extends:
      file: compose.yaml
      service: nodeodm
